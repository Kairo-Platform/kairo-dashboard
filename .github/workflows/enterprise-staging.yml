name: Enterprise Dashboard — Staging

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ENTERPRISE_STAGING_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ENTERPRISE_STAGING_PROJECT_ID }}

on:
  push:
    branches: [staging]
    paths:
      - "apps/kairo-enterprise-dashboard/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/enterprise-staging.yml"
  pull_request:
    branches: [staging]
    paths:
      - "apps/kairo-enterprise-dashboard/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/enterprise-staging.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo lint typecheck build --filter=@kairo/enterprise-dashboard

  deploy:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
